<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Hamza Labz | Project Gallery</title>

    <style>
        :root {
            --primary-accent: #8A2BE2;
            --bg-dark: #0A0A0A;
            --bg-light: #1A1A1A;
            --text-color: #FFFFFF;
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': 'var(--bg-dark)',
                        'bg-light': 'var(--bg-light)',
                        'primary-accent': 'var(--primary-accent)',
                    }
                }
            }
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
        }

        .gallery-item {
            background-color: var(--bg-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .gallery-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }
    </style>
</head>

<body>

    <header class="bg-bg-dark border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-widest text-primary-accent">HAMZA LABZ</h1>
            <nav>
                <a href="index.html" class="text-gray-400 hover:text-primary-accent px-3 py-2">Home</a>
                <a href="#" class="text-primary-accent font-semibold px-3 py-2 bg-bg-light/50 rounded-lg">Gallery</a>
            </nav>
        </div>
    </header>

    <main class="min-h-screen">
        <section class="pt-16 pb-10 text-center">
            <h2 class="text-4xl font-extrabold mb-3">The 9+ Project Showcase</h2>
            <p class="text-gray-400">Featuring 9+ unique completed projects.</p>
        </section>

        <section class="pb-20 px-4 sm:px-6 lg:px-8">
            <div class="max-w-7xl mx-auto">
                
               <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10 auto-rows-[250px] grid-flow-dense">

                    <div class="gallery-item">
                        <img src="images/ACTUAL DESIGN - This is what we publish!.png" alt="Creative" />
                        <div class="overlay"><h4 class="font-bold">Sticker</h4></div>
                    </div>

                    <div class="gallery-item">
                        <img src="images/sns 2.jpg" />
                        <div class="overlay"><h4 class="font-bold">Menu</h4></div>
                    </div>

                    <div class="gallery-item sm:col-span-2 h-full">
                        <img src="images/FB Cover Pic - 820x360 px.png" />
                        <div class="overlay"><h4 class="font-bold">Facebook Cover Image</h4></div>
                    </div>

                    <div class="gallery-item row-span-2 h-full">
                        <img src="images/Chabi kids.png" />
                        <div class="overlay"><h4 class="font-bold">Social Media Poster</h4></div>
                    </div>

                    <div class="gallery-item">
                        <img src="images/Coconut Ghanakatha.png" />
                        <div class="overlay"><h4 class="font-bold">Coconut Product Ad</h4></div>
                    </div>

                    <div class="gallery-item">
                        <img src="images/For boys online.png" />
                        <div class="overlay"><h4 class="font-bold">Online Tutoring</h4></div>
                    </div>

                    <div class="gallery-item sm:col-span-2 h-full">
                        <img src="images/Ilm Gate Facebook Cover.png">
                        <div class="overlay"><h4 class="font-bold">Banner Ad</h4></div>
                    </div>

                    <div class="gallery-item">
                        <img src="images/Geemy-769 Hair Trimmer.png">
                        <div class="overlay"><h4 class="font-bold">Offer Ad</h4></div>
                    </div>

                    <div class="gallery-item">
                        <img src="images/La Had Post for Safran Moulavi .png" />
                        <div class="overlay"><h4 class="font-bold">Sales Ad</h4></div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-bg-dark border-t border-gray-800 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            &copy; 2025 HamzaLabz. All rights reserved.
        </div>
    </footer>

</body>
</html>
